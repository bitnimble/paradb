name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start Supabase
        run: supabase start

      - name: Write Supabase config into .env.test
        run: |
          supabase status -o env > /tmp/supabase_env
          source /tmp/supabase_env
          # CI uses the main Supabase instance (default ports), so override
          # the test-instance ports that .env.test defaults to.
          sed -i "s|^PGPORT=.*|PGPORT=54322|" .env.test
          sed -i "s|^S3_ENDPOINT=.*|S3_ENDPOINT=http://127.0.0.1:54321/storage/v1/s3|" .env.test
          sed -i "s|^NEXT_PUBLIC_SUPABASE_URL=.*|NEXT_PUBLIC_SUPABASE_URL=http://127.0.0.1:54321|" .env.test
          sed -i "s|^NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY=.*|NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY=$ANON_KEY|" .env.test
          sed -i "s|^SUPABASE_SECRET_KEY=.*|SUPABASE_SECRET_KEY=$SERVICE_ROLE_KEY|" .env.test

      - name: Typecheck and lint
        run: bun check

      - name: Start dev server
        run: |
          ./node_modules/.bin/dotenv -e .env.test -- bun next dev &
          # Wait for the server to be ready
          for i in $(seq 1 30); do
            if curl -s http://localhost:3000 > /dev/null 2>&1; then
              echo "Server is ready"
              break
            fi
            echo "Waiting for server to start... ($i/30)"
            sleep 2
          done

      - name: Run tests
        run: bun test

      - name: Stop Supabase
        if: always()
        run: supabase stop
